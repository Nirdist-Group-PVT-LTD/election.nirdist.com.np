name: Election Live Sync
on:
  schedule: [{cron: "*/10 * * * *"}] # Runs every 10 mins
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: python scraper.py
      - run: |
          git config user.name "ElectionBot"
          git add data.json
          git commit -m "Live Update"
          git push
