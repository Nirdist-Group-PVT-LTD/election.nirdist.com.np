name: Election Data Sync
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Create File
        run: touch data.json
      - name: Run Scraper
        run: python scraper.py
      - name: Push Updates
        run: |
          git config user.name "Nirdist-Bot"
          git config user.email "bot@nirdist.com.np"
          git add data.json
          git commit -m "Live Update: $(date)" || echo "No changes"
          git push
