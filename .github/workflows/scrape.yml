name: Election Live Scraper
on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes
  workflow_dispatch:

permissions:
  contents: write # THIS IS THE FIX: Grants permission to write data.json

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scraper.py

      - name: Push Update
        run: |
          git config user.name "NepalElectionBot"
          git config user.email "bot@nepalvotes.live"
          git add data.json
          git commit -m "Live Update: $(date)" || echo "No changes"
          git push
