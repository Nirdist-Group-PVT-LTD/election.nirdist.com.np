name: Scrape Live Election Data

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run scraper
        run: python scraper.py
        
      - name: Commit and push if changed
        run: |
          git config user.name "Automated Scraper"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git commit -m "Update election data" || exit 0
          git push

      - name: Commit and push if changed
        run: |
          git config user.name "Automated Scraper"
          git config user.email "actions@users.noreply.github.com"
          # Check if data.json exists before trying to add it
          if [ -f data.json ]; then
            git add data.json
            git commit -m "Update election data" || echo "No changes to commit"
            git push
          else
            echo "data.json was not created. Check scraper.py for errors."
            exit 1
          fi
