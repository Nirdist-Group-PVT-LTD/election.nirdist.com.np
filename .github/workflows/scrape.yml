name: Scrape Live Election Data
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write  # CRITICAL: Allows the action to save data.json

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run scraper
        run: python scraper.py
        
      - name: Commit and push
        run: |
          git config user.name "Automated Scraper"
          git config user.email "actions@github.com"
          if [ -f data.json ]; then
            git add data.json
            git commit -m "Update March 6 Election Results" || echo "No changes"
            git push
          else
            echo "Error: data.json not found"
            exit 1
          fi
