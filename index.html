<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nepal Election 2026 | Live GIS Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 500px; border-radius: 1rem; }
        .party-rsp { color: #00aeef; } .party-uml { color: #dd0000; } .party-nc { color: #1a5a96; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-[1000] shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic">NEPAL<span class="text-blue-400">VOTES</span>2026</h1>
            <div id="clock" class="text-xs font-mono text-blue-300 uppercase">Syncing...</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 space-y-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm flex gap-4 items-center">
                <input type="text" id="searchPlace" placeholder="Search District or Constituency (e.g. Jhapa-5)" 
                       class="flex-1 bg-gray-50 border p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="searchMap()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">Search</button>
            </div>
            
            <div class="bg-white p-2 rounded-2xl shadow-sm border h-[550px]">
                <div id="map"></div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden flex flex-col h-[650px]">
            <div id="panel-header" class="bg-slate-800 p-6 text-white">
                <h2 id="place-name" class="text-2xl font-black uppercase">National Overview</h2>
                <p id="place-meta" class="text-sm opacity-70 italic">Click map for local data</p>
            </div>
            <div id="detail-list" class="p-4 overflow-y-auto space-y-4 flex-1">
                <div class="text-center py-10 text-gray-400">Select a region to see every detail...</div>
            </div>
        </div>
    </main>

    <script>
        let electionData = {};
        const map = L.map('map').setView([28.3949, 84.1240], 7);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function init() {
            // 1. Load Scraped Data
            const response = await fetch('data.json');
            electionData = await response.json();
            document.getElementById('clock').innerText = "Last Sync: " + electionData.metadata.last_update;

            // 2. Load Nepal GeoJSON (Districts)
            const geoRes = await fetch('https://raw.githubusercontent.com/mesaugat/geoJSON-Nepal/master/nepal-districts.geojson');
            const geoJSON = await geoRes.json();

            L.geoJSON(geoJSON, {
                style: (feature) => ({
                    fillColor: electionData.places[feature.properties.DISTRICT]?.color || '#cbd5e1',
                    weight: 1, opacity: 1, color: 'white', fillOpacity: 0.7
                }),
                onEachFeature: (feature, layer) => {
                    layer.on('click', () => {
                        map.fitBounds(layer.getBounds());
                        renderDetails(feature.properties.DISTRICT);
                    });
                }
            }).addTo(map);
        }

        function renderDetails(districtName) {
            const data = electionData.places[districtName];
            document.getElementById('place-name').innerText = districtName;
            document.getElementById('place-meta').innerText = `${data.constituencies.length} Constituencies - Live Results`;
            
            let html = '';
            data.constituencies.forEach(c => {
                html += `
                <div class="border p-4 rounded-xl bg-gray-50 hover:border-blue-500 transition cursor-default">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-bold bg-blue-100 text-blue-700 px-2 py-0.5 rounded">${c.name}</span>
                        <span class="text-[10px] font-bold text-green-600 uppercase tracking-tighter">${c.status}</span>
                    </div>
                    <p class="text-lg font-black leading-tight">${c.leader}</p>
                    <div class="flex justify-between text-xs mt-1">
                        <span class="font-bold text-gray-500">${c.party}</span>
                        <span class="font-mono">${c.votes.toLocaleString()} votes</span>
                    </div>
                    <div class="mt-2 text-[10px] text-red-500 font-bold">Lead Margin: ${c.margin}</div>
                </div>`;
            });
            document.getElementById('detail-list').innerHTML = html;
        }

        function searchMap() {
            const query = document.getElementById('searchPlace').value.trim();
            // Basic search logic: find district that matches or contains query
            for (let dist in electionData.places) {
                if (dist.toLowerCase() === query.toLowerCase()) {
                    renderDetails(dist);
                    return;
                }
            }
            alert("Place not found. Try 'Kathmandu' or 'Jhapa'.");
        }

        init();
    </script>
</body>
</html>
