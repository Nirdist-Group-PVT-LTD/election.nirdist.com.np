<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NepalVotes 2026 | Live Election Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .live-dot { animation: pulse 2s infinite; }
        .rsp-blue { color: #00aeef; }
        .rsp-bg { background-color: #00aeef; }
    </style>
</head>
<body class="bg-[#f0f2f5] text-slate-900">

    <nav class="bg-[#1a365d] text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter">NEPAL<span class="text-blue-400">VOTES</span></h1>
            <div class="flex items-center gap-3">
                <span class="bg-red-600 px-2 py-1 rounded text-[10px] font-bold flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-white rounded-full live-dot"></span> LIVE
                </span>
                <span id="update-time" class="text-[10px] opacity-60 font-mono">Loading...</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-6 space-y-6">
        
        <section class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Total Seats</p>
                <p class="text-3xl font-black">275</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-500">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Declared</p>
                <p id="stat-declared" class="text-3xl font-black">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-orange-400">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Leading</p>
                <p id="stat-leading" class="text-3xl font-black">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-red-600">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Majority</p>
                <p class="text-3xl font-black">138</p>
            </div>
        </section>

        <div class="relative">
            <input type="text" placeholder="Search Constituency or Candidate..." class="w-full p-4 rounded-xl border-none shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div class="grid lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm">
                <h2 class="text-lg font-black mb-6 uppercase tracking-tight border-b pb-2">FPTP Standings</h2>
                <div id="fptp-list" class="space-y-6">
                    </div>
            </div>

            <div class="space-y-6">
                <div class="bg-[#1a365d] text-white p-6 rounded-3xl shadow-lg">
                    <h2 class="text-md font-bold mb-4 uppercase">PR Vote Share %</h2>
                    <div id="pr-list" class="space-y-3"></div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="text-xs font-black mb-4 uppercase text-gray-400">Province Highlights</h2>
                    <div id="province-list" class="grid grid-cols-2 gap-2"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function refreshData() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                const d = await res.json();
                
                document.getElementById('update-time').innerText = "Last Sync: " + d.updated;
                document.getElementById('stat-declared').innerText = d.summary.declared;
                document.getElementById('stat-leading').innerText = d.summary.leading;

                // Render FPTP Bars
                document.getElementById('fptp-list').innerHTML = d.fptp.map(p => `
                    <div>
                        <div class="flex justify-between font-bold text-sm mb-1">
                            <span>${p.party}</span>
                            <span style="color: ${p.color}">${p.seats}</span>
                        </div>
                        <div class="w-full bg-gray-100 h-3 rounded-full overflow-hidden">
                            <div class="h-full rounded-full transition-all duration-1000" style="width: ${(p.seats/165)*100}%; background-color: ${p.color}"></div>
                        </div>
                    </div>
                `).join('');

                // Render PR Shares
                document.getElementById('pr-list').innerHTML = d.pr.map(p => `
                    <div class="flex justify-between text-xs border-b border-blue-800 pb-2">
                        <span class="opacity-70">${p.party}</span>
                        <span class="font-bold">${p.share}%</span>
                    </div>
                `).join('');

                // Render Provinces
                document.getElementById('province-list').innerHTML = d.provinces.map(pr => `
                    <div class="bg-gray-50 p-3 rounded-xl border text-center">
                        <p class="text-[8px] font-bold text-gray-400 uppercase">${pr.name}</p>
                        <p class="text-[10px] font-black text-blue-900">${pr.lead}</p>
                    </div>
                `).join('');

            } catch (e) { console.log("Waiting for data.json..."); }
        }
        setInterval(refreshData, 15000);
        refreshData();
    </script>
</body>
</html>
