<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Live Election Updates</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #dc143c; } /* Crimson red for Nepal */
        .timestamp { text-align: center; font-size: 0.9em; color: #666; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #003893; color: white; } /* Blue from Nepal flag */
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>

<div class="container">
    <h1>Nepal Election Live Updates</h1>
    <div class="timestamp" id="last-updated">Fetching latest data...</div>

    <table>
        <thead>
            <tr>
                <th>Political Party / Candidate</th>
                <th>Votes Counted</th>
            </tr>
        </thead>
        <tbody id="results-body">
            </tbody>
    </table>
</div>

<script>
    async function fetchElectionData() {
        try {
            // Add a cache-busting query parameter so the browser always gets the newest file
            const response = await fetch('data.json?' + new Date().getTime());
            const data = await response.json();

            document.getElementById('last-updated').innerText = 'Last Updated: ' + data.last_updated;

            const tbody = document.getElementById('results-body');
            tbody.innerHTML = ''; // Clear old data

            // Sort by votes descending
            data.results.sort((a, b) => b.votes - a.votes);

            data.results.forEach(item => {
                const row = `<tr>
                                <td>${item.party}</td>
                                <td>${item.votes.toLocaleString()}</td>
                             </tr>`;
                tbody.innerHTML += row;
            });
        } catch (error) {
            console.error('Error fetching data:', error);
            document.getElementById('last-updated').innerText = 'Error loading live updates. Please refresh.';
        }
    }

    // Fetch immediately on load, then check every 60 seconds
    fetchElectionData();
    setInterval(fetchElectionData, 60000); 
</script>

</body>
</html>
