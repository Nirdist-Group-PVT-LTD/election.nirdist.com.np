<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Nepal Election 2026 Live Results | Real-Time Seat Counts</title>
    <meta name="description" content="Get the latest real-time updates on the Nepal General Election 2026. Live seat counts, party leads, and breaking electoral news from across Nepal.">
    <meta name="keywords" content="Nepal Election 2026, Live Election Results Nepal, Nepal Voting Update, Election Commission Nepal, House of Representatives Results">
    <link rel="canonical" href="https://yourdomain.com/election-2026">

    <meta property="og:title" content="LIVE: Nepal General Election 2026 Results">
    <meta property="og:description" content="Stay updated with live counting and party-wise leads in the 2026 Nepal Elections.">
    <meta property="og:image" content="https://yourdomain.com/election-banner.jpg">
    <meta property="og:url" content="https://yourdomain.com/election-2026">
    <meta name="twitter:card" content="summary_large_image">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsArticle",
      "headline": "Nepal General Election 2026 Live Counting",
      "datePublished": "2026-03-06",
      "author": {"@type": "Organization", "name": "Your News Brand"}
    }
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-YOUR_CLIENT_ID" crossorigin="anonymous"></script>

    <style>
        :root { --nepal-red: #dc143c; --nepal-blue: #003893; --shadow: 0 4px 15px rgba(0,0,0,0.1); }
        body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #f8f9fa; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 650px; margin: auto; }
        
        /* AD SLOT AT TOP */
        .ad-top { text-align: center; margin-bottom: 20px; background: #fff; border-radius: 8px; overflow: hidden; }

        .card { background: white; border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }
        .header { background: var(--nepal-blue); color: white; padding: 25px 20px; text-align: center; position: relative; }
        .live-indicator { position: absolute; top: 10px; right: 15px; color: #00ff00; font-size: 11px; font-weight: 900; letter-spacing: 1px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .update-time { font-size: 13px; opacity: 0.8; margin-top: 8px; font-style: italic; }
        .results-container { padding: 10px 0; }
        .row { display: flex; align-items: center; padding: 18px 20px; border-bottom: 1px solid #f0f0f0; transition: background 0.3s; }
        .row:hover { background: #fcfcfc; }
        .party-info { flex: 1; padding-right: 20px; }
        .party-name { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
        .vote-count { font-size: 28px; font-weight: 900; color: var(--nepal-blue); min-width: 60px; text-align: right; }
        
        .bar-container { height: 10px; background: #e9ecef; border-radius: 5px; overflow: hidden; }
        .bar { height: 100%; transition: width 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        
        footer { text-align: center; padding: 20px; font-size: 12px; color: #777; }
    </style>
</head>
<body>

    <div class="container">
        <div class="ad-top">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-YOUR_CLIENT_ID"
                 data-ad-slot="YOUR_AD_SLOT_ID"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <div class="card">
            <div class="header">
                <div class="live-indicator">● LIVE UPDATES</div>
                <h1 style="margin:0; font-size: 24px; letter-spacing: -0.5px;">Nepal Election 2026</h1>
                <div class="update-time" id="clock">Connecting to Election Server...</div>
            </div>
            <div id="results-list" class="results-container">
                <p style="text-align:center; padding: 40px; color: #999;">Fetching latest leads...</p>
            </div>
        </div>

        <div class="ad-top" style="margin-top:20px;">
             <ins class="adsbygoogle" style="display:block" data-ad-format="fluid" data-ad-layout-key="-fb+5w+4e-db+86" data-ad-client="ca-pub-YOUR_CLIENT_ID" data-ad-slot="YOUR_AD_SLOT_ID"></ins>
             <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <footer>
            Data provided for informational purposes. © 2026 Your News Agency.
        </footer>
    </div>

    <script>
        async function updateResults() {
            try {
                const res = await fetch('data.json?cache_bust=' + Date.now());
                if (!res.ok) throw new Error('Network response was not ok');
                const data = await res.json();
                
                document.getElementById('clock').innerText = "Last Updated: " + data.last_updated;
                
                const list = document.getElementById('results-list');
                
                // Using a DocumentFragment for better performance
                const fragment = document.createDocumentFragment();
                
                data.results.forEach(p => {
                    const percentage = Math.min((p.leads / 165) * 100, 100); 
                    const row = document.createElement('div');
                    row.className = 'row';
                    row.innerHTML = `
                        <div class="party-info">
                            <div class="party-name">${p.party}</div>
                            <div class="bar-container">
                                <div class="bar" style="width:${percentage}%; background:${p.color || '#ccc'}"></div>
                            </div>
                        </div>
                        <div class="vote-count">${p.leads}</div>
                    `;
                    fragment.appendChild(row);
                });

                list.innerHTML = ''; 
                list.appendChild(fragment);
                
            } catch (e) { 
                console.error("Update failed:", e);
                document.getElementById('clock').innerText = "Syncing...";
            }
        }

        // Initial fetch
        updateResults();
        // Refresh every 30 seconds
        setInterval(updateResults, 30000);
    </script>
</body>
</html>
