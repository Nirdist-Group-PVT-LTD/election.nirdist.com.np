<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NepalVotes 2026 – Live Election Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .live-dot { animation: pulse 2s infinite; }
        .bar-transition { transition: width 1.5s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">

    <nav class="bg-[#1a365d] text-white sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl font-bold tracking-tighter uppercase">Nepal<span class="text-blue-400">Votes</span></span>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1.5 bg-red-600 px-2 py-0.5 rounded text-[10px] font-bold">
                    <span class="w-1.5 h-1.5 bg-white rounded-full live-dot"></span> LIVE
                </div>
                <span id="update-time" class="text-[10px] opacity-60 font-mono">Syncing...</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-6 space-y-8">
        
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border-t-4 border-blue-500 text-center">
                <p class="text-xs font-bold text-gray-400 uppercase">Total Seats</p>
                <p class="text-3xl font-black">275</p>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border-t-4 border-green-500 text-center">
                <p class="text-xs font-bold text-gray-400 uppercase">Declared</p>
                <p id="stat-declared" class="text-3xl font-black">0</p>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border-t-4 border-orange-500 text-center">
                <p class="text-xs font-bold text-gray-400 uppercase">Leading</p>
                <p id="stat-leading" class="text-3xl font-black">0</p>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border-t-4 border-red-500 text-center">
                <p class="text-xs font-bold text-gray-400 uppercase">Majority</p>
                <p class="text-3xl font-black">138</p>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                    <h2 class="text-xl font-black mb-6 flex items-center justify-between">
                        Party Tally (FPTP)
                        <span class="text-[10px] text-gray-400 font-normal">165 Constituencies</span>
                    </h2>
                    <div id="party-bars" class="space-y-6">
                        </div>
                </div>

                <div>
                    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">🔥 Hot Seats (Live Trends)</h2>
                    <div id="hot-seats" class="grid md:grid-cols-2 gap-4">
                        </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-[#1a365d] text-white p-6 rounded-3xl shadow-xl">
                    <h2 class="text-lg font-black mb-4 uppercase tracking-tight">PR Vote Share</h2>
                    <div id="pr-list" class="space-y-4">
                        </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="text-sm font-black mb-4 uppercase">Province Lead</h2>
                    <div id="province-list" class="grid grid-cols-2 gap-3 text-center">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();

                // 1. Header & Stats
                document.getElementById('update-time').innerText = "Last Updated: " + data.updated;
                document.getElementById('stat-declared').innerText = data.summary.declared;
                document.getElementById('stat-leading').innerText = data.summary.leading;

                // 2. Party Bars (FPTP)
                const barContainer = document.getElementById('party-bars');
                barContainer.innerHTML = data.fptp.map(p => {
                    const pct = (p.seats / 165) * 100;
                    return `
                    <div>
                        <div class="flex justify-between font-bold text-sm mb-1.5">
                            <span>${p.party}</span>
                            <span style="color: ${p.color}">${p.seats}</span>
                        </div>
                        <div class="w-full bg-gray-100 h-3.5 rounded-full overflow-hidden">
                            <div class="bar-transition h-full rounded-full" style="width: ${pct}%; background-color: ${p.color}"></div>
                        </div>
                    </div>`;
                }).join('');

                // 3. Hot Seats
                const hotContainer = document.getElementById('hot-seats');
                hotContainer.innerHTML = data.hot_seats.map(s => `
                    <div class="bg-white border p-4 rounded-2xl shadow-sm">
                        <p class="text-[10px] font-bold text-blue-500 uppercase mb-2">${s.constituency}</p>
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-sm text-gray-700">${s.leader}</span>
                            <span class="text-blue-600 font-black">${s.l_votes}</span>
                        </div>
                        <div class="text-[10px] flex justify-between text-gray-400">
                            <span>vs ${s.runner} (${s.r_party})</span>
                            <span>${s.r_votes}</span>
                        </div>
                    </div>`).join('');

                // 4. PR Shares
                const prContainer = document.getElementById('pr-list');
                prContainer.innerHTML = data.pr.map(p => `
                    <div class="flex justify-between border-b border-blue-800 pb-2 text-sm">
                        <span class="opacity-80">${p.party}</span>
                        <span class="font-bold">${p.share}%</span>
                    </div>`).join('');

                // 5. Provinces
                const provContainer = document.getElementById('province-list');
                provContainer.innerHTML = data.provinces.map(pr => `
                    <div class="bg-gray-50 p-2 rounded-xl border border-gray-100">
                        <p class="text-[8px] text-gray-400 uppercase font-bold">${pr.name}</p>
                        <p class="text-[11px] font-black text-blue-900">${pr.lead}</p>
                    </div>`).join('');

            } catch (err) { console.log("Still loading data.json..."); }
        }
        setInterval(loadData, 15000);
        loadData();
    </script>
</body>
</html>
