<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Election 2026 | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .live-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .rsp-bg { background-color: #00aeef; }
        .nc-bg { background-color: #1a5a96; }
        .uml-bg { background-color: #dd0000; }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-xl mx-auto px-4 py-8">
        <div class="bg-white rounded-t-2xl p-6 shadow-sm border-b">
            <div class="flex justify-between items-center mb-4">
                <span class="bg-red-100 text-red-600 text-xs font-bold px-2 py-1 rounded flex items-center">
                    <span class="w-2 h-2 bg-red-600 rounded-full mr-2 live-dot"></span> LIVE COUNTING
                </span>
                <span id="update-time" class="text-gray-400 text-xs">Syncing...</span>
            </div>
            <h1 class="text-2xl font-black text-gray-800">Nepal Election 2026</h1>
            <p class="text-gray-500 text-sm mt-1">House of Representatives (HoR) Results</p>
        </div>

        <div class="bg-indigo-900 p-4 flex justify-around text-white shadow-md">
            <div class="text-center"><p class="text-[10px] opacity-70">CONSTITUENCIES</p><p class="font-bold">165</p></div>
            <div class="text-center"><p class="text-[10px] opacity-70">DECLARED</p><p class="font-bold" id="declared">0</p></div>
            <div class="text-center"><p class="text-[10px] opacity-70">VOTES CAST</p><p class="font-bold">60%</p></div>
        </div>

        <div id="results-container" class="bg-white rounded-b-2xl shadow-xl overflow-hidden">
            <div class="p-10 text-center text-gray-400">Loading live feed...</div>
        </div>

        <p class="text-center text-gray-400 text-[10px] mt-6">Data Source: Election Commission of Nepal (Official)</p>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const res = await fetch('data.json?cache=' + Date.now());
                const data = await res.json();
                
                document.getElementById('update-time').innerText = "Last Updated: " + data.last_updated;
                
                const container = document.getElementById('results-container');
                container.innerHTML = data.results.map(p => `
                    <div class="flex items-center p-4 border-b hover:bg-gray-50 transition">
                        <div class="flex-1">
                            <h3 class="font-bold text-gray-800">${p.party}</h3>
                            <div class="w-full bg-gray-100 h-2 rounded-full mt-2 overflow-hidden">
                                <div class="h-full rounded-full" style="width: ${(p.votes/165)*100}%; background-color: ${p.color}"></div>
                            </div>
                        </div>
                        <div class="ml-6 text-right">
                            <span class="text-2xl font-black" style="color: ${p.color}">${p.votes}</span>
                            <p class="text-[10px] text-gray-400 uppercase font-bold">Leads</p>
                        </div>
                    </div>
                `).join('');
            } catch (e) { console.error("Update Error", e); }
        }
        updateDashboard();
        setInterval(updateDashboard, 15000); // 15s refresh
    </script>
</body>
</html>
