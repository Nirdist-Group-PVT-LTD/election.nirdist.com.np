<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Election 2026 | Live Updates</title>
    <style>
        :root { --nepal-red: #dc143c; --nepal-blue: #003893; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .card { max-width: 600px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--nepal-blue); color: white; padding: 20px; text-align: center; position: relative; }
        .live-indicator { position: absolute; top: 10px; right: 10px; color: #44ff44; font-size: 12px; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .update-time { font-size: 12px; opacity: 0.8; margin-top: 5px; }
        .row { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee; }
        .party-info { flex: 1; }
        .party-name { font-weight: bold; font-size: 16px; }
        .vote-count { font-size: 24px; font-weight: 800; color: var(--nepal-blue); }
        .bar-container { height: 8px; background: #eee; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .bar { height: 100%; transition: width 1s ease-in-out; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="live-indicator">● LIVE COUNTING</div>
            <h1 style="margin:0; font-size: 22px;">Nepal General Election 2026</h1>
            <div class="update-time" id="clock">Loading current leads...</div>
        </div>
        <div id="results-list"></div>
    </div>

    <script>
        async function updateResults() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                const data = await res.json();
                document.getElementById('clock').innerText = "Last Updated: " + data.last_updated;
                
                const list = document.getElementById('results-list');
                list.innerHTML = '';
                
                data.results.forEach(p => {
                    const percentage = (p.leads / 165) * 100; // Based on FPTP seats
                    list.innerHTML += `
                        <div class="row">
                            <div class="party-info">
                                <div class="party-name">${p.party}</div>
                                <div class="bar-container"><div class="bar" style="width:${percentage}%; background:${p.color}"></div></div>
                            </div>
                            <div class="vote-count">${p.leads}</div>
                        </div>`;
                });
            } catch (e) { console.error("Update failed", e); }
        }
        updateResults();
        setInterval(updateResults, 30000); // Refresh every 30 seconds
    </script>
</body>
</html>
